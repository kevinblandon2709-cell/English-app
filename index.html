<!DOCTYPE html>
<html>
<head>
  <title>Language App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #f7f7f7;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: #58cc02;
      color: white;
      font-size: 16px;
    }
    input {
      padding: 10px;
      width: 80%;
      margin: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<h1>Select Language</h1>

<div class="card">
  <button onclick="start('english')">English</button>
  <button onclick="start('spanish')">Spanish</button>
  <button onclick="start('french')">French</button>
</div>

<div class="card" id="app" style="display:none;">
  <h2 id="question"></h2>
  <button onclick="speak()">🔊 Speak</button>
  <br>
  <input id="answer" placeholder="Type what you hear">
  <br>
  <button onclick="check()">Check</button>
  <p id="result"></p>
</div>

<script>
let words = {
  english: ["hello","good morning","thank you","beautiful","computer","language","education","challenge","experience","development"],
  spanish: ["hola","buenos dias","gracias","hermoso","computadora","idioma","educacion","desafio","experiencia","desarrollo"],
  french: ["bonjour","merci","ordinateur","langue","education","defi","experience","developpement","beau","matin"]
};

let currentLang = "";
let currentWord = "";
let difficulty = 0;

function start(lang){
  currentLang = lang;
  document.querySelector("h1").style.display = "none";
  document.querySelector(".card").style.display = "none";
  document.getElementById("app").style.display = "block";
  next();
}

function next(){
  let list = words[currentLang];
  difficulty = Math.min(difficulty, list.length - 1);
  currentWord = list[Math.floor(Math.random() * (difficulty + 1))];
  document.getElementById("question").innerText = "Listen...";
  document.getElementById("answer").value = "";
  document.getElementById("result").innerText = "";
  speak();
}

function speak(){
  let utterance = new SpeechSynthesisUtterance(currentWord);
  speechSynthesis.speak(utterance);
}

function check(){
  let user = document.getElementById("answer").value.toLowerCase();
  if(user === currentWord){
    document.getElementById("result").innerText = "✅ Correct!";
    difficulty++;
  } else {
    document.getElementById("result").innerText = "❌ Correct answer: " + currentWord;
  }
  setTimeout(next, 1500);
}
</script>

</body>
</html>
